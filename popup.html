<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Chat Session Exporter</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main>
      <h1>Copy chat</h1>

      <label class="field-label" for="format">Format</label>
      <select id="format" name="format">
        <option value="json">JSON</option>
        <option value="markdown">Markdown</option>
      </select>

      <label class="checkbox-row">
        <input id="includeHtml" type="checkbox" />
        <span>Include HTML in JSON</span>
      </label>

      <button id="exportButton" type="button">Copy current chat</button>

      <p id="status" role="status" aria-live="polite"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
